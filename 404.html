<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Page not found · SAM Construction</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%230b1a0b'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='central' text-anchor='middle' font-family='serif' font-size='22' font-weight='600' fill='%23c9a84c'%3ES%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0b1a0b;color:#f5f2ec;
    font-family:'Montserrat',sans-serif;font-weight:300;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:40px 20px;
  }
  .wrap{max-width:600px}
  .code{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(120px,20vw,220px);font-weight:300;line-height:1;
    color:#c9a84c;letter-spacing:4px;
  }
  h1{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(32px,5vw,48px);font-weight:300;
    margin:20px 0 16px;
  }
  p{font-size:14px;line-height:1.8;color:rgba(245,242,236,0.55);margin-bottom:40px}
  a.btn{
    display:inline-block;padding:18px 48px;
    border:1px solid #c9a84c;color:#c9a84c;text-decoration:none;
    font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;
    transition:all 0.3s;
  }
  a.btn:hover{background:#c9a84c;color:#0b1a0b}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you are looking for does not exist or has been moved. Let us guide you back to solid ground.</p>
  <a class="btn" href="/">← Back to home</a>
</div>
</body>
</html>
