<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#132613"/>
      <stop offset="1" stop-color="#0b1a0b"/>
    </linearGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Corner accents -->
  <g stroke="#c9a84c" stroke-width="1.5" fill="none">
    <polyline points="60,120 60,60 120,60"/>
    <polyline points="1140,60 1140,120"/>
    <polyline points="1080,60 1140,60"/>
    <polyline points="60,510 60,570 120,570"/>
    <polyline points="1140,570 1140,510"/>
    <polyline points="1080,570 1140,570"/>
  </g>

  <!-- Eyebrow -->
  <line x1="100" y1="230" x2="170" y2="230" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="185" y="236" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#c9a84c" letter-spacing="6">PREMIUM CONSTRUCTION — LUXEMBOURG</text>

  <!-- Main title -->
  <text x="100" y="345" font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif" font-size="104" font-weight="300" fill="#f5f2ec" letter-spacing="1">SAM Construction</text>

  <!-- Tagline in italic gold -->
  <text x="100" y="420" font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif" font-size="38" font-weight="300" font-style="italic" fill="#c9a84c">We build excellence. In stone.</text>

  <!-- Bottom info line -->
  <line x1="100" y1="495" x2="180" y2="495" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="100" y="530" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#f5f2ec" fill-opacity="0.6">s.à r.l  ·  Michelau  ·  Luxembourg  ·  Est. 2009</text>

  <!-- Mark in top-right -->
  <g transform="translate(1020, 85)">
    <rect width="100" height="100" rx="8" fill="#0b1a0b" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5"/>
    <text x="50" y="66" font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif" font-size="62" font-weight="400" fill="#c9a84c" text-anchor="middle">S</text>
    <rect x="32" y="78" width="36" height="1.8" fill="#c9a84c"/>
  </g>
</svg>
